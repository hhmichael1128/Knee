const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function deriveKey(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function unlock(pw,remember){
  const key=await deriveKey(pw);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(IV)},key,b64d(CT)); // throws on wrong pw
  const html=new TextDecoder().decode(pt);
  if(remember)try{localStorage.setItem("aclr.pw",pw)}catch(e){}
  document.open();document.write(html);document.close();
}
const f=document.getElementById("f"),err=document.getElementById("err"),go=document.getElementById("go");
f.addEventListener("submit",async(e)=>{
  e.preventDefault();err.textContent="";go.disabled=true;go.textContent="Unlocking…";
  try{await unlock(document.getElementById("pw").value,document.getElementById("rem").checked);}
  catch(ex){err.textContent="Wrong password — try again.";go.disabled=false;go.textContent="Unlock";document.getElementById("pw").select();}
});
// auto-unlock if a password was remembered on this device
(async()=>{try{const saved=localStorage.getItem("aclr.pw");if(saved){await unlock(saved,true);}}catch(e){try{localStorage.removeItem("aclr.pw")}catch(_){}}})();
